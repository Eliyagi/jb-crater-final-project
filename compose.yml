name: crater

volumes:
  gh-archive-cache:
  streaming_data:
  streaming_checkpoints:
  spark_pg_data:
  neo4j_data:

services:
  # ─── 1. DATA INIT (One-shot) ──────────────────────────────────
  data-init:
    build: ./vendor
    container_name: crater-data-init
    command: ["python", "/app/download_and_preprocess.py", "/cache"]
    volumes:
      - gh-archive-cache:/cache
    env_file:
      - .env
    restart: "no"

  # ─── 2. UPSTREAM VENDOR MOCK ──────────────────────────────────
  gh-archive-vendor:
    build: ./vendor
    container_name: crater-gh-archive-vendor
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      data-init:
        condition: service_completed_successfully
    volumes:
      - gh-archive-cache:/cache
    ports:
      - "18400:8000"
    environment:
      DATA_DIR: /cache
      REPLAY_SECONDS_PER_HOUR: ${REPLAY_SECONDS_PER_HOUR:-2}
      REPLAY_WINDOW_START: ${REPLAY_WINDOW_START:-2024-01-15}
      REPLAY_WINDOW_END: ${REPLAY_WINDOW_END:-2024-01-21}
      VENDOR_SLOW_FILE_RATE: ${VENDOR_SLOW_FILE_RATE:-0}
      VENDOR_LATE_FILE_RATE: ${VENDOR_LATE_FILE_RATE:-0}
      VENDOR_LATE_FILE_DELAY_SECONDS: ${VENDOR_LATE_FILE_DELAY_SECONDS:-60}
      VENDOR_TRUNCATED_FILE_RATE: ${VENDOR_TRUNCATED_FILE_RATE:-0}
      VENDOR_SCHEMA_DRIFT: ${VENDOR_SCHEMA_DRIFT:-off}
      VENDOR_OUTAGE_SCHEDULE: ${VENDOR_OUTAGE_SCHEDULE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ─── 3. OUR INGESTOR ──────────────────────────────
  ingestor:
    build:
      context: .
      dockerfile: ingestor/Dockerfile
    container_name: ingestor-python
    shm_size: '256m'
    mem_limit: 512m  
    depends_on:
      kafka:
        condition: service_healthy
      gh-archive-vendor:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src
    tty: true
    stdin_open: true

  # ─── 4. KAFKA BROKER ──────────────────────────────────────────────────
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka-broker
    hostname: kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_MIN_INSYNC_REPLICAS=1
      - KAFKA_CFG_NUM_PARTITIONS=6
      - KAFKA_KRAFT_CLUSTER_ID=streaming-clickstream-cluster
      - KAFKA_CFG_NUM_NETWORK_THREADS=2
      - KAFKA_CFG_NUM_IO_THREADS=2
      - KAFKA_HEAP_OPTS=-Xms256m -Xmx256m
    ports:
      - "29092:29092"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── 5. KAFKA UI ──────────────────────────────────────────────────────
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui-dashboard
    hostname: kafka-ui
    environment:
      - KAFKA_CLUSTERS_0_NAME=crater-streaming
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - DYNAMIC_CONFIG_ENABLED=true
    ports:
      - "28080:8080"
    mem_limit: 256m  # צמצמנו ל-256m, רק מציג דאשבורד
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── 6. SPARK PROCESSOR ────────────────────────────────────────────────
  spark-processor:
    build:
      context: .
      dockerfile: ./spark-code/Dockerfile
    container_name: spark-processor
    hostname: spark
    user: root
    volumes:
      - ./spark-code:/app/code
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=gh-archive-events
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=crater_analytics
      - PG_USER=spark
      - PG_PASSWORD=spark
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
    entrypoint: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G  # הורדנו מ-3G ל-1.5G כדי לפנות מקום ל-Neo4j ולמערכת
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ─── 7. POSTGRES ANALYST STORE ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres-server
    hostname: postgres
    environment:
      - POSTGRES_USER=spark
      - POSTGRES_PASSWORD=spark
      - POSTGRES_DB=crater_analytics
    ports:
      - "5432:5432"
    volumes:
      - spark_pg_data:/var/lib/postgresql/data
    mem_limit: 384m  # ייעלנו ל-384m, מספיק מעל ומעבר לפיתוח מקומי
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d crater_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─── 8. NEO4J GRAPH STORE ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5.21
    container_name: neo4j-server
    hostname: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_server_memory_heap_initial__size=256m  # תיקון סינטקס לגרסה 5
      - NEO4J_server_memory_heap_max__size=512m      # תיקון סינטקס לגרסה 5
      - NEO4J_server_memory_pagecache_size=256m      # תיקון סינטקס לגרסה 5
    volumes:
      - neo4j_data:/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped